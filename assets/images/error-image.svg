<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="300" height="300" fill="#F8F9FA"/>
  
  <!-- 装饰元素 -->
  <circle cx="150" cy="100" r="40" fill="#FFF3E0" stroke="#FFE0B2" stroke-width="2"/>
  
  <!-- 裂开效果 -->
  <path d="M120 80 L180 120" stroke="#FF9800" stroke-width="2" stroke-linecap="round" stroke-dasharray="2,2"/>
  <path d="M180 80 L120 120" stroke="#FF9800" stroke-width="2" stroke-linecap="round" stroke-dasharray="2,2"/>
  
  <!-- 图标 -->
  <path d="M140 90 L145 85 L155 95 L160 90 L155 100 L145 90 Z" fill="#FF9800"/>
  
  <!-- 文字 -->
  <text x="150" y="160" font-family="Arial, sans-serif" font-size="18" fill="#333333" text-anchor="middle" font-weight="500">图片加载失败</text>
  <text x="150" y="190" font-family="Arial, sans-serif" font-size="14" fill="#757575" text-anchor="middle">Image failed to load</text>
  
  <!-- 装饰线条 -->
  <path d="M80 220 L220 220" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="150" y="245" font-family="Arial, sans-serif" font-size="12" fill="#9E9E9E" text-anchor="middle">点击刷新重试</text>
</svg>